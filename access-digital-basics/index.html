<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Course Access — Lake Digital</title>
  
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../styles.css">
  
  <style>
    .access-container {
      max-width: 800px;
      margin: 80px auto;
      padding: 40px;
      background: #1e293b;
      border: 1px solid #38bdf8;
      border-radius: 16px;
      text-align: center;
    }
    
    .success-icon {
      width: 80px; height: 80px;
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 20px;
    }

    .download-list { text-align: left; margin: 40px 0; padding: 0; list-style: none; }

    .download-item {
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-download {
      background: #38bdf8;
      color: #0f172a;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .security-notice {
      padding: 15px;
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid #ef4444;
      text-align: left;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <div class="brand" style="display: flex; align-items: center; gap: 12px;">
        <span style="font-weight: 800; color: white; text-transform: uppercase;">Lake Digital</span>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="access-container">
      <div class="success-icon">✓</div>
      <h1>Your Access is Ready</h1>
      <p style="color: #94a3b8;">Thank you for choosing <strong>Lake Essentials</strong>.</p>

      <ul class="download-list">
        <li class="download-item">
          <div>
            <h4 style="margin:0; color:#fff;">Lake Essentials: Part 1</h4>
            <p style="margin:0; font-size:0.8rem; color:#94a3b8;">PDF Guide • 2.4 MB</p>
          </div>
          <a href="guide-part1.pdf" download class="btn-download">Download</a>
        </li>
        <li class="download-item">
          <div>
            <h4 style="margin:0; color:#fff;">Lake Essentials: Part 2</h4>
            <p style="margin:0; font-size:0.8rem; color:#94a3b8;">PDF Guide • 1.8 MB</p>
          </div>
          <a href="guide-part2.pdf" download class="btn-download">Download</a>
        </li>
      </ul>

      <div class="security-notice">
        <strong>Security Notice:</strong> Do not share this URL. Your access is linked to your transaction.
      </div>
    </div>
  </main>
</body>
</html>
