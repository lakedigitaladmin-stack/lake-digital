<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lake CRM — Transaction Tracking</title>
  
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --muted: #94a3b8;
      --accent: #38bdf8; --accent-2: #60a5fa; --white: #f8fafc;
      --success: #10b981;
    }

    body {
      font-family: Inter, system-ui, -apple-system; margin: 0;
      color: var(--white); background: linear-gradient(180deg, #071025 0%, #0a192f 60%);
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }

    .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    
    .login-wrapper { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    .login-box { background: var(--card); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center; }
    
    .dashboard { display: none; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .stat-card { background: var(--card); padding: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); text-align: center; }
    .stat-number { font-size: 2.5rem; font-weight: 800; color: var(--accent); margin-top: 10px; }
    .stat-label { color: var(--muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

    .add-section-wrapper { position: relative; margin-bottom: 20px; padding-top: 15px; padding-bottom: 15px; }
    .form-trigger { height: 5px; width: 100%; background: transparent; cursor: default; }

    .add-form { 
      background: var(--card); border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); 
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; align-items: end; 
      max-height: 0; opacity: 0; overflow: hidden; margin-top: 0; padding: 0 25px;      
      transform: translateY(-10px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .add-section-wrapper:hover .add-form,
    .add-section-wrapper:focus-within .add-form,
    .add-form.locked {
      max-height: 600px; opacity: 1; padding: 25px; margin-top: 5px; transform: translateY(0);
      box-shadow: 0 20px 50px rgba(0,0,0,0.3); border-color: rgba(56, 189, 248, 0.3);
    }

    .add-form label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 0.85rem; font-weight: 500; }

    input, select { 
      width: 100%; padding: 0 15px; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); 
      color: white; border-radius: 10px; outline: none; height: 48px; box-sizing: border-box; font-size: 0.95rem;
      transition: border-color 0.3s;
    }

    input:focus, select:focus { border-color: var(--accent); }

    .btn-primary { 
      background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: #0f172a; padding: 0 20px; 
      height: 48px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; transition: 0.3s; 
      width: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.95rem;
    }

    .table-container { overflow-x: auto; background: var(--card); border-radius: 16px; border: 1px solid rgba(255,255,255,0.06); }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 18px; color: var(--muted); border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.8rem; text-transform: uppercase; }
    td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--white); vertical-align: middle; }
    
    .action-buttons { display: flex; gap: 12px; opacity: 0; transition: opacity 0.2s; justify-content: flex-end; }
    tr:hover .action-buttons { opacity: 1; }
    .btn-icon { background: transparent; border: none; cursor: pointer; font-size: 1.2rem; }

    /* СТИЛИ СТАТУСОВ */
    .status-group { display: flex; gap: 5px; align-items: center; }
    .badge-paid { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(16, 185, 129, 0.2); }
    .badge-completed { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(56, 189, 248, 0.2); }
    .badge-refunded { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; border: 1px solid rgba(239, 68, 68, 0.2); }
    
    .promo-tag { font-size: 0.7rem; color: var(--accent); background: rgba(56, 189, 248, 0.1); padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; font-weight: 600;}

    .loader-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loader" class="loader-overlay"><div class="loader"></div></div>

  <div id="loginScreen" class="login-wrapper">
    <div class="login-box">
      <h2 style="color: var(--white);">Lake CRM</h2>
      <input type="password" id="adminPass" placeholder="Admin Password" style="margin-bottom: 15px;">
      <button class="btn-primary" onclick="login()">Login</button>
      <p id="loginError" style="color: #ef4444; margin-top: 10px; display: none;">Access Denied</p>
    </div>
  </div>

  <div id="dashboard" class="admin-container dashboard">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
      <h1 style="font-size: 1.8rem; margin: 0;">Sales Dashboard <span style="color: var(--accent);">Lake Digital</span></h1>
      <button onclick="location.reload()" style="background:#334155; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight: bold;">Logout</button>
    </header>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Net Revenue</div><div class="stat-number" id="totalRevenue">€0</div></div>
      <div class="stat-card"><div class="stat-label">Total Sales</div><div class="stat-number" id="totalSales">0</div></div>
    </div>

    <div class="add-section-wrapper">
      <div class="form-trigger"></div>
      <div class="add-form" id="addForm">
        <div><label>Date</label><input type="date" id="datePart"></div>
        <div><label>Time</label><input type="time" id="timePart" step="1"></div>
        <div><label>Client Name</label><input type="text" id="nameInput" placeholder="John Doe"></div>
        <div><label>Email</label><input type="email" id="emailInput" placeholder="client@email.com"></div>
        <div><label>Transaction ID</label><input type="text" id="txnInput" placeholder="PA-123..."></div>
        <div>
          <label>Product</label>
          <select id="productInput">
            <option value="Lake Essentials">Lake Essentials</option>
            <option value="Deep Dive Dev">Deep Dive Dev</option>
          </select>
        </div>
        <div><label>Promo Code</label><input type="text" id="promoInput" placeholder="LAKE230"></div>
        <div><label>Price</label><input type="number" id="priceInput" value="250"></div>
        <div>
          <label>Status</label>
          <select id="statusInput">
            <option value="Paid">Paid</option>
            <option value="Refunded">Refunded</option>
          </select>
        </div>
        <div><button id="submitBtn" class="btn-primary" onclick="handleFormSubmit()">+ Sync</button></div>
      </div>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>Date / Time</th>
            <th>Name</th>
            <th>Email</th>
            <th>TXN ID</th>
            <th>Product</th>
            <th>Amount</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const BIN_ID = "6a05dfb0adc21f119a9d0bc6"; 
    const API_KEY = "$2a$10$.a8ITUCzHYmZDnKl0qdlq.hNr6yLUdGTcfIz4QsYsVLQAclCr92HC";
    const PASSWORD = "admin123$"; 
    let salesData = [];
    let editingId = null;

    setNow();

    function setNow() {
        const now = new Date();
        document.getElementById('datePart').value = now.toISOString().split('T')[0];
        document.getElementById('timePart').value = now.toTimeString().split(' ')[0];
    }

    function login() {
      if (document.getElementById('adminPass').value === PASSWORD) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
      } else { document.getElementById('loginError').style.display = 'block'; }
    }

    async function loadData() {
      showLoader(true);
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { 
            headers: { 'X-Master-Key': API_KEY } 
        });
        const d = await res.json();
        salesData = d.record.customers || [];
        renderTable();
      } catch (e) { alert("Load Error: " + e.message); }
      showLoader(false);
    }

    async function handleFormSubmit() {
      const record = { 
          id: editingId || Date.now(), 
          date: `${document.getElementById('datePart').value} ${document.getElementById('timePart').value}`,
          rawDate: document.getElementById('datePart').value,
          rawTime: document.getElementById('timePart').value,
          name: document.getElementById('nameInput').value,
          email: document.getElementById('emailInput').value, 
          txnId: document.getElementById('txnInput').value, 
          product: document.getElementById('productInput').value, 
          price: parseFloat(document.getElementById('priceInput').value),
          promo: document.getElementById('promoInput').value,
          status: document.getElementById('statusInput').value
      };

      if (editingId) { 
          const i = salesData.findIndex(s => s.id === editingId); 
          salesData[i] = record; 
      } else { salesData.push(record); }

      showLoader(true);
      try {
        await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
          method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
          body: JSON.stringify({ customers: salesData })
        });
        location.reload();
      } catch (e) { alert("Save Error"); }
      showLoader(false);
    }

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = "";
      let totalRevenue = 0;
      
      salesData.sort((a,b) => b.id - a.id).forEach(sale => {
        if (sale.status === 'Paid') totalRevenue += sale.price;

        // ЛОГИКА ОТОБРАЖЕНИЯ СТАТУСОВ
        let statusHtml = '';
        if (sale.status === 'Paid') {
            statusHtml = `
                <div class="status-group">
                    <span class="badge-paid">Paid</span>
                    <span class="badge-completed">Completed</span>
                </div>`;
        } else {
            statusHtml = `<span class="badge-refunded">Refunded</span>`;
        }

        tbody.innerHTML += `
          <tr>
            <td style="font-family: monospace; color:var(--muted);">${sale.date}</td>
            <td><strong>${sale.name || '-'}</strong></td>
            <td>${sale.email}</td>
            <td><small style="color:var(--muted)">${sale.txnId || '-'}</small></td>
            <td>${sale.product}</td>
            <td style="font-weight:bold; color:var(--accent)">€${sale.price}</td>
            <td>${statusHtml}</td>
            <td>
              <div class="action-buttons">
                <button class="btn-icon" onclick="editSale(${sale.id})">✏️</button>
                <button class="btn-icon" onclick="deleteSale(${sale.id})">🗑️</button>
              </div>
            </td>
          </tr>`;
      });
      document.getElementById('totalRevenue').innerText = `€${totalRevenue}`;
      document.getElementById('totalSales').innerText = salesData.length;
    }

    function editSale(id) {
      const item = salesData.find(s => s.id === id);
      document.getElementById('nameInput').value = item.name;
      document.getElementById('emailInput').value = item.email;
      editingId = id;
      document.getElementById('addForm').classList.add('locked');
      window.scrollTo(0,0);
    }

    async function deleteSale(id) {
      if(!confirm("Delete?")) return;
      salesData = salesData.filter(s => s.id !== id);
      showLoader(true);
      await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
        body: JSON.stringify({ customers: salesData })
      });
      location.reload();
    }

    function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
  </script>
</body>
</html>
